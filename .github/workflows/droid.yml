name: Droid Tag

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, edited]

jobs:
  droid:
    if: |
      secrets.FACTORY_API_KEY != '' && (
      (github.event_name == 'issue_comment' && contains(toLower(github.event.comment.body || ''), '@droid')) ||
      (github.event_name == 'pull_request_review_comment' && contains(toLower(github.event.comment.body || ''), '@droid')) ||
      (github.event_name == 'pull_request_review' && contains(toLower(github.event.review.body || ''), '@droid')) ||
      (github.event_name == 'issues' && (contains(toLower(github.event.issue.body || ''), '@droid') || contains(toLower(github.event.issue.title || ''), '@droid'))) ||
      (github.event_name == 'pull_request' && (contains(toLower(github.event.pull_request.body || ''), '@droid') || contains(toLower(github.event.pull_request.title || ''), '@droid')))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - name: Run Droid Exec
        uses: Factory-AI/droid-action@main
        with:
          factory_api_key: ${{ secrets.FACTORY_API_KEY }}
