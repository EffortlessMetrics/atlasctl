name: Droid Tag

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, edited]

jobs:
  droid:
    if: |
      (github.event_name == 'issue_comment' && github.event.comment.body != '' && contains(github.event.comment.body, '@droid')) ||
      (github.event_name == 'pull_request_review_comment' && github.event.comment.body != '' && contains(github.event.comment.body, '@droid')) ||
      (github.event_name == 'pull_request_review' && github.event.review.body != '' && contains(github.event.review.body, '@droid')) ||
      (github.event_name == 'issues' && ((github.event.issue.body != '' && contains(github.event.issue.body, '@droid')) || (github.event.issue.title != '' && contains(github.event.issue.title, '@droid')))) ||
      (github.event_name == 'pull_request' && ((github.event.pull_request.body != '' && contains(github.event.pull_request.body, '@droid')) || (github.event.pull_request.title != '' && contains(github.event.pull_request.title, '@droid'))))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - name: Check for Factory API key
        id: check_factory_key
        shell: bash
        env:
          FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
        run: |
          if [ -z "${FACTORY_API_KEY}" ]; then
            echo "has_key=false" >> "${GITHUB_OUTPUT}"
          else
            echo "has_key=true" >> "${GITHUB_OUTPUT}"
          fi
      - name: Run Droid Exec
        if: steps.check_factory_key.outputs.has_key == 'true'
        uses: Factory-AI/droid-action@main
        with:
          factory_api_key: ${{ secrets.FACTORY_API_KEY }}
