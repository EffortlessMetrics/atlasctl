nodes:
  - id: "req:dead"
    kind: "requirement"
    title: "Dead selector"
    paths:
      - "nonexistent/*"
  - id: "req:orphan"
    kind: "requirement"
    title: "Orphan node"
  - id: "cmd:stale"
    kind: "command"
    title: "Stale command"
  - id: "scen:valid"
    kind: "scenario"
    title: "Valid scenario"
  - id: "cmd:ci"
    kind: "command"
    title: "CI command"
edges:
  - from: "scen:valid"
    kind: "exercises"
    to: "crate:engine"
  - from: "scen:valid"
    kind: "runs_with"
    to: "cmd:ci"
