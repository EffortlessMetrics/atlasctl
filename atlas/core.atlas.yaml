nodes:
  - id: req:deterministic-atlas
    kind: requirement
    title: Deterministic atlas
    summary: The atlas must compile into stable machine-readable and human-readable artifacts.

  - id: req:queryable-proof-topology
    kind: requirement
    title: Queryable proof topology
    summary: The repo should expose its behavior and proof surfaces through query and trace operations.

  - id: req:low-metadata-tax
    kind: requirement
    title: Low metadata tax
    summary: Adopting and maintaining the atlas should be low-friction via scaffolding and automation.

  - id: scen:build-emits-canonical-atlas
    kind: scenario
    title: Build emits canonical atlas
    summary: The build command compiles the repo into atlas.json and atlas.md.
    owns:
      - crates/atlasctl-render/src/lib.rs
    touches:
      - crates/atlasctl-cli/src/main.rs

  - id: scen:check-fails-on-broken-links
    kind: scenario
    title: Check fails on broken links
    summary: Structural validation rejects broken graph references.
    owns:
      - crates/atlasctl-core/src/lib.rs

  - id: scen:query-and-trace-navigate-behavior
    kind: scenario
    title: Query and trace navigate behavior
    summary: Query and trace expose the atlas as a navigation layer.
    touches:
      - crates/atlasctl-core/src/lib.rs
      - crates/atlasctl-cli/src/main.rs

  - id: scen:automated-scaffolding-reduces-friction
    kind: scenario
    title: Automated scaffolding reduces friction
    summary: The init and scaffold commands generate valid atlas metadata.
    touches:
      - crates/atlasctl-cli/src/main.rs

  - id: scen:full-release-verification
    kind: scenario
    title: Full release verification
    summary: The ci-full task ensures all repo standards are met before release.

edges:
  - from: scen:build-emits-canonical-atlas
    kind: proves
    to: req:deterministic-atlas

  - from: scen:check-fails-on-broken-links
