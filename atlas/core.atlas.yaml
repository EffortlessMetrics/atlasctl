nodes:
  - id: req:deterministic-atlas
    kind: requirement
    title: Deterministic atlas
    summary: The atlas must compile into stable machine-readable and human-readable artifacts.

  - id: req:queryable-proof-topology
    kind: requirement
    title: Queryable proof topology
    summary: The repo should expose its behavior and proof surfaces through query and trace operations.

  - id: req:low-metadata-tax
    kind: requirement
    title: Low metadata tax
    summary: Adopting and maintaining the atlas should be low-friction via scaffolding and automation.

  - id: roadmap:v01-proof-topology
    kind: roadmap
    title: Proof-topology roadmap
    summary: Ship a deterministic local proof graph and review workflow across the repository stack.

  - id: proposal:proof-topology-stack
    kind: proposal
    title: Proof-topology stack roadmap
    summary: Introduce source-of-truth nodes, active goals, support checks, and review packets.

  - id: spec:proof-topology-stack
    kind: spec
    title: Proof-topology stack spec
    summary: Deterministic source-of-truth compiler behavior and deterministic impact review surfaces.
    owns:
      - schemas/*.json
      - docs/artifact-protocol.md
    touches:
      - schemas/*.json
      - docs/artifact-protocol.md

  - id: goal:ship-proof-topology-stack
    kind: goal
    title: Ship source-of-truth stack lane
    summary: Establish review-oriented proof topology behavior as the repo's default workflow contract.

  - id: goal:advance-review-packet-router
    kind: goal
    title: Advance review-packet router readiness
    summary: Improve external adoption and PR-surface clarity for post closeout v0.1 work.

  - id: plan:closeout-proof-topology-v0-1
    kind: plan
    title: v0.1 proof-topology closeout
    summary: Finish the source-of-truth stack lane with closeout-ready governance and operational documentation.

  - id: plan:post-closeout-router-readiness-v0-2
    kind: plan
    title: v0.2 review-packet router readiness
    summary: Consolidate post-closeout follow-up around review-surface, scope diagnostics, and operational continuity.

  - id: closeout:v0-1-proof-topology
    kind: closeout
    title: v0.1 proof-topology closeout
    summary: Capture final governance, evidence, and next-goal handoff for the lane.

  - id: doc:repository-documentation
    kind: document
    title: Repository documentation
    summary: Documentation files for operator guidance, process notes, and release handoff.
    owns:
      - BUILDING.md
      - TESTING.md
      - fixtures/**/*.md

  - id: scen:post-closeout-review-surface-hardening
    kind: scenario
    title: Post-closeout review-surface hardening
    summary: Collect and act on residual scope/proof-surface mismatches through review-packet and dogfood follow-up work.
    owns:
      - docs/handoffs/*.md
      - .codex/**/*.toml
    touches:
      - .codex/**/*.toml
      - policy/**/*.toml
      - schemas/*.json
      - RELEASE.md

  - id: scen:build-emits-canonical-atlas
    kind: scenario
    title: Build emits canonical atlas
    summary: The build command compiles the repo into atlas.json and atlas.md.
    owns:
      - crates/atlasctl-render/src/lib.rs
      - crates/atlasctl-cli/src/main.rs
      - crates/atlasctl-cli/tests/cli_integration.rs
    touches:
      - crates/atlasctl-core/src/lib.rs

  - id: scen:check-fails-on-broken-links
    kind: scenario
    title: Check fails on broken links
    summary: Structural validation rejects broken graph references.
    owns:
      - crates/atlasctl-core/src/lib.rs

  - id: scen:query-and-trace-navigate-behavior
    kind: scenario
    title: Query and trace navigate behavior
    summary: Query and trace expose the atlas as a navigation layer.
    touches:
      - crates/atlasctl-core/src/lib.rs

  - id: scen:automated-scaffolding-reduces-friction
    kind: scenario
    title: Automated scaffolding reduces friction
    summary: The init and scaffold commands generate valid atlas metadata.
    touches:
      - crates/atlasctl-cli/src/main.rs

  - id: scen:full-release-verification
    kind: scenario
    title: Full release verification
    summary: The ci-full task ensures all repo standards are met before release.
    owns:
      - AGENTS.md
      - RELEASE.md
      - atlas/core.atlas.yaml
      - crates/atlasctl-app/src/lib.rs
      - crates/atlasctl-discover-fs/src/lib.rs
      - crates/atlasctl-types/src/lib.rs
      - fixtures/**/*.toml
      - fixtures/**/*.rs
      - fixtures/**/*.yaml
      - xtask/src/main.rs
    touches:
      - atlas/core.atlas.yaml
      - atlas/*.yaml
      - .gemini/**/*.json
      - .gitignore
      - atlas.toml
      - AGENTS.md
      - README.md
      - BUILDING.md
      - TESTING.md
      - Cargo.toml
      - Cargo.lock
      - crates/atlasctl-*/**
      - codecov.yml
      - fixtures/**/*.toml
      - fixtures/**/*.rs
      - fixtures/**/*.yaml
      - schemas/*.json
      - policy/**/*.toml
      - .codex/**
      - xtask/**
      - justfile
      - rust-toolchain.toml

