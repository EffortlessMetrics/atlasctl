    kind: exercises
    to: crate:atlasctl-core

  - from: scen:query-and-trace-navigate-behavior
    kind: exercises
    to: crate:atlasctl-cli

  - from: scen:automated-scaffolding-reduces-friction
    kind: exercises
    to: crate:atlasctl-cli

  - from: scen:automated-scaffolding-reduces-friction
    kind: exercises
    to: crate:atlasctl-app

